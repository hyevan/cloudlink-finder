name: Set Package Public
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  setpublic:
    runs-on: ubuntu-latest
    steps:
      - name: Set GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/user/packages?per_page=50" -o /tmp/u.json || true
          echo "USER PACKAGES:"; cat /tmp/u.json || true
          curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/hyevan/cloudlink-finder/packages?per_page=50" -o /tmp/r.json || true
          echo "REPO PACKAGES:"; cat /tmp/r.json || true
          PKGID=""
          for f in /tmp/u.json /tmp/r.json; do
            if [ -z "$PKGID" ]; then
              PKGID=$(python3 -c "import json;d=json.load(open('$f'));print([p['id'] for p in d if 'cloudlink' in str(p.get('name','')).lower()][0])" 2>/dev/null) || true
            fi
          done
          echo "PKGID=$PKGID"
          if [ -n "$PKGID" ]; then
            echo "PATCH /user/packages/$PKGID"
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" -d '{"visibility":"public"}' "https://api.github.com/user/packages/$PKGID" || true
            echo ""
          else
            echo "NO PKGID - GraphQL fallback"
            Q='{"query":"query{repository(owner:\"hyevan\",name:\"cloudlink-finder\"){packages(first:20){nodes{id name}}}}"}'
            echo "GRAPHQL: $(curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$Q" https://api.github.com/graphql)"
          fi
