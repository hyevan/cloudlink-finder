name: Set Package Public
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  setpublic:
    runs-on: ubuntu-latest
    steps:
      - name: List + set public via REST
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "===== REST /user/packages ====="
          curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/user/packages?package_type=container&per_page=50" | tee /tmp/pkgs.json
          PKGID=$(python3 -c "import json; d=json.load(open('/tmp/pkgs.json')); print([p['id'] for p in d if 'cloudlink' in p['name'].lower()][0])" 2>/dev/null)
          echo "PKGID=$PKGID"
          if [ -n "$PKGID" ]; then
            echo "===== try PATCH /user/packages/$PKGID ====="
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" -d '{"visibility":"public"}' "https://api.github.com/user/packages/$PKGID" | head -c 400
            echo ""
            echo "===== try GraphQL updatePackageVisibility ====="
            M=$(printf '{"query":"mutation{updatePackageVisibility(input:{packageId:\"%s\",visibility:PUBLIC}){package{id name}}}"}' "$PKGID")
            curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$M" https://api.github.com/graphql
            echo ""
          else
            echo "NO PACKAGE FOUND in REST listing"
          fi
