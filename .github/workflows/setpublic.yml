name: Set Package Public
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  setpublic:
    runs-on: ubuntu-latest
    steps:
      - name: Set GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5 6; do
            Q='{"query":"query{repository(owner:\"hyevan\",name:\"cloudlink-finder\"){packages(first:20){nodes{id name}}}}"}'
            RESP=$(curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$Q" https://api.github.com/graphql)
            echo "QUERY($i): $RESP"
            PKGID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); ns=d.get('data',{}).get('repository',{}).get('packages',{}).get('nodes',[]); print([n['id'] for n in ns if 'cloudlink' in n['name'].lower()][0])" 2>/dev/null)
            if [ -n "$PKGID" ]; then
              M=$(printf '{"query":"mutation{updatePackageVisibility(input:{packageId:\"%s\",visibility:PUBLIC}){package{id name}}}"}' "$PKGID")
              echo "MUTATE: $(curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$M" https://api.github.com/graphql)"
              break
            fi
            echo "  package not found yet, retry $i in 10s..."
            sleep 10
          done
