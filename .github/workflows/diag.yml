name: diag
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - name: diag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== viewer ==="; curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/user | python3 -c "import sys,json;d=json.load(sys.stdin);print('login',d.get('login'),'type',d.get('type'))"
          for PT in docker container; do echo "=== /user/packages?package_type=$PT ==="; curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/user/packages?package_type=$PT&per_page=50" | head -c 600; echo; done
          for O in hyevan jindekun520-dev; do echo "=== repo $O/cloudlink-finder packages totalCount ==="; curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "{\"query\":\"query{repository(owner:\\\"$O\\\",name:\\\"cloudlink-finder\\\"){packages{totalCount nodes{id name}}}}\"}" https://api.github.com/graphql | head -c 600; echo; done
