name: Build & Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ok=0
          for i in $(seq 1 8); do
            code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"visibility":"public"}' \
              "https://api.github.com/users/${{ github.actor }}/packages/container/cloudlink-finder/visibility")
            echo "attempt $i -> HTTP $code"
            cat /tmp/resp.txt; echo
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              ok=1; echo "package set to public"; break
            fi
            sleep 12
          done
          if [ "$ok" != "1" ]; then
            echo "FAILED to set package public"; exit 1
          fi
