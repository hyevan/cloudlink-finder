name: Set package public (diag)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  setpublic:
    runs-on: ubuntu-latest
    steps:
      - name: Try visibility endpoints
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== try multiple visibility endpoints ==="
          eps=(
            "https://api.github.com/user/packages/container/cloudlink-finder/visibility"
            "https://api.github.com/users/hyevan/packages/container/cloudlink-finder/visibility"
            "https://api.github.com/repos/hyevan/cloudlink-finder/packages/container/cloudlink-finder/visibility"
            "https://api.github.com/repos/hyevan/cloudlink-finder/packages/container/hyevan%2Fcloudlink-finder/visibility"
          )
          for ep in "${eps[@]}"; do
            echo "## EP: $ep"
            code=$(curl -s -o /tmp/r.txt -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"visibility":"public"}' "$ep")
            echo "  HTTP $code | $(cat /tmp/r.txt)"
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              echo ">>> SUCCESS: $ep"
              echo "FINAL_OK"
              exit 0
            fi
            sleep 3
          done
          echo "ALL_FAILED"
