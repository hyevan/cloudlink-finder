name: Build & Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Diagnose + set public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Package visibility diagnostic ==="
          for ep in \
            "https://api.github.com/users/${{ github.actor }}/packages/container/cloudlink-finder/visibility" \
            "https://api.github.com/repos/${{ github.repository }}/packages/container/cloudlink-finder/visibility" ; do
            echo "## Endpoint: $ep"
            for i in 1 2 3; do
              code=$(curl -s -o /tmp/r.txt -w "%{http_code}" -X PATCH \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d '{"visibility":"public"}' "$ep")
              body=$(cat /tmp/r.txt)
              echo "  attempt $i: HTTP $code | body: $body"
              if [ "$code" = "204" ] || [ "$code" = "200" ]; then
                echo "SUCCESS on $ep"
                echo "FINAL_OK"
                exit 0
              fi
              sleep 8
            done
          done
          echo "ALL_ENDPOINTS_FAILED"
          exit 1
